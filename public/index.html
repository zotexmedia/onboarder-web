<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Client Onboarder</title>
<link rel="icon" href="/favicon.ico" sizes="any" />
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<style>
  :root{ --ink:#000; --paper:#fff; --mute:#666; --line:#000; --hair:#dcdcdc; --wash:#f5f5f5; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; background:var(--paper); color:var(--ink); }
  body{ font:14px/1.55 "Helvetica Neue",Helvetica,Arial,sans-serif; -webkit-font-smoothing:antialiased; }
  .mono{ font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace; }

  header{ display:flex; align-items:baseline; gap:14px; padding:16px 22px; border-bottom:2px solid var(--ink); }
  header h1{ font-size:15px; font-weight:800; letter-spacing:.14em; text-transform:uppercase; margin:0; }
  header .meta{ font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--mute); }

  .wrap{ display:grid; grid-template-columns:430px 1fr; min-height:calc(100vh - 53px); }
  .left{ padding:22px; border-right:2px solid var(--ink); }
  .right{ padding:22px 26px; background:var(--paper); }

  label{ display:block; font-size:10.5px; letter-spacing:.13em; text-transform:uppercase; color:var(--mute); margin:16px 0 6px; }
  textarea, input[type=text]{ width:100%; background:var(--paper); color:var(--ink); border:1px solid var(--ink);
    border-radius:0; padding:10px 11px; font-size:13px; }
  textarea{ min-height:240px; resize:vertical; font-family:ui-monospace,Menlo,Consolas,monospace; line-height:1.5; }
  input[type=text]:focus, textarea:focus{ outline:none; box-shadow:inset 0 0 0 1px var(--ink); }
  .two{ display:flex; gap:12px; } .two>div{ flex:1; }
  .hint{ font-size:11px; color:var(--mute); margin-top:6px; }

  .btns{ display:flex; gap:0; margin-top:22px; border:1px solid var(--ink); }
  button{ flex:1; border:0; border-radius:0; padding:13px 14px; font:inherit; font-weight:700;
    letter-spacing:.1em; text-transform:uppercase; font-size:12px; cursor:pointer; }
  .btn-preview{ background:var(--paper); color:var(--ink); border-right:1px solid var(--ink); }
  .btn-create{ background:var(--ink); color:var(--paper); }
  .btn-preview:hover{ background:var(--wash); } .btn-create:hover{ background:#222; }
  button:disabled{ opacity:.4; cursor:not-allowed; }

  .empty{ color:var(--mute); margin-top:60px; font-size:13px; }
  .empty .big{ display:block; font-size:11px; letter-spacing:.16em; text-transform:uppercase; margin-bottom:8px; color:var(--ink); }

  .block{ border-top:2px solid var(--ink); padding:16px 0 18px; }
  .block:first-child{ border-top:0; }
  .block h3{ margin:0 0 12px; font-size:11px; font-weight:800; letter-spacing:.14em; text-transform:uppercase; display:flex; align-items:center; gap:10px; }
  .kv{ display:grid; grid-template-columns:148px 1fr; gap:6px 16px; font-size:13px; }
  .kv .k{ font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--mute); padding-top:1px; }

  .pill{ display:inline-block; padding:2px 8px; font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; border:1px solid var(--ink); }
  .pill.on{ background:var(--ink); color:var(--paper); }

  pre{ background:var(--wash); border:1px solid var(--hair); border-radius:0; padding:10px 11px; margin:8px 0 0;
    font-size:12px; line-height:1.5; white-space:pre-wrap; word-break:break-word; }
  .sig{ display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:10px; }
  .sig .h{ font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--mute); }

  .urlbox{ display:flex; border:1px solid var(--ink); }
  .urlbox input{ flex:1; border:0; }
  .urlbox input:focus{ box-shadow:none; }
  .urlbtn{ border:0; border-left:1px solid var(--ink); background:var(--paper); color:var(--ink); padding:0 16px;
    font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; cursor:pointer; text-decoration:none; display:flex; align-items:center; }
  .urlbtn:hover{ background:var(--ink); color:var(--paper); }

  .logs{ font-size:11.5px; color:var(--mute); }
  .err{ color:var(--ink); font-weight:700; }
  a{ color:var(--ink); }
</style>
</head>
<body>
<header>
  <h1>Client Onboarder</h1>
  <span class="meta" id="health">—</span>
</header>

<div class="wrap">
  <div class="left">
    <label>Onboarding form</label>
    <textarea id="text" placeholder="Full Name: ...
Personal Phone Number: ...
Full Business Name: ...
Business Address: ...
Your Website: ...
Which Email Address(es) ... : ...
Best Business Phone Number ... : ...
What name(s) should we use ... : ...
List All Possible Cities ... : CITY, CITY, CITY
Which industries / niches ... : ...
What is the maximum number of leads ... : ..."></textarea>

    <div class="two">
      <div><label>Brand</label><input id="brand" type="text" placeholder="defaults to business name" /></div>
      <div><label>Account tag</label><input id="tag" type="text" placeholder="defaults to brand" /></div>
    </div>

    <label>Apollo template (Industry Specific)</label>
    <input id="apolloSource" type="text" placeholder='e.g. ABS Commercial Cleaning Industry Specific' />

    <label>GMaps template</label>
    <input id="gmapsSource" type="text" placeholder='e.g. Regal Cleaning Services (GMaps)' />

    <label>Timezone override</label>
    <input id="timezone" type="text" placeholder="auto from address state" />
    <div class="hint">Leave blank — set from the client's state automatically.</div>

    <div class="btns">
      <button class="btn-preview" id="btnPreview">Preview</button>
      <button class="btn-create" id="btnCreate">Create in Instantly</button>
    </div>
    <div class="hint">Create makes campaigns <b>paused</b>. The tag is for sending accounts — the inbox manager applies it.</div>
  </div>

  <div class="right" id="out">
    <div class="empty"><span class="big">No output yet</span>Paste a form and press Preview to see the parsed client, the Apollo link, and the campaign signature swap.</div>
  </div>
</div>

<script>
const $=(id)=>document.getElementById(id);
fetch('/api/health').then(r=>r.json()).then(h=>{ $('health').textContent = h.hasKey?'Instantly · connected':'No API key'; }).catch(()=>{});
function esc(s){ return (s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

async function run(create){
  const body={ text:$('text').value, brand:$('brand').value, tag:$('tag').value,
    apolloSource:$('apolloSource').value, gmapsSource:$('gmapsSource').value, timezone:$('timezone').value, create };
  $('btnPreview').disabled=true; $('btnCreate').disabled=true;
  $('out').innerHTML='<div class="empty"><span class="big">Working…</span></div>';
  try{
    const r=await fetch('/api/onboard',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const data=await r.json();
    if(!data.ok){ $('out').innerHTML='<div class="block"><h3>Error</h3><pre class="err">'+esc(data.error)+'</pre>'+logsHtml(data.logs)+'</div>'; return; }
    render(data);
  }catch(e){ $('out').innerHTML='<div class="block"><h3>Request failed</h3><pre class="err">'+esc(e.message)+'</pre></div>'; }
  finally{ $('btnPreview').disabled=false; $('btnCreate').disabled=false; }
}
function logsHtml(logs){ return (!logs||!logs.length)?'':'<div class="block"><h3>Log</h3><pre class="logs">'+esc(logs.join('\n'))+'</pre></div>'; }
function kv(k,v){ return '<div class="k">'+k+'</div><div>'+v+'</div>'; }
function copyUrl(){ const el=$('apolloUrl'); el.select(); document.execCommand('copy'); }

function render(d){
  const p=d.parsed; let h='';
  h+='<div class="block"><h3>Parsed client <span class="pill '+(d.created?'on':'')+'">'+(d.created?'created':'preview')+'</span></h3><div class="kv">'
    +kv('Contact', esc(p.fullName)+'  '+esc(p.personalPhone))
    +kv('Business', esc(p.businessName))
    +kv('Signature', esc(d.signatureAddress))
    +kv('Website', esc(p.website))
    +kv('Forward to', esc((p.forwardingEmails||[]).join(', ')||'—'))
    +kv('Sig. phone', esc((p.signaturePhones||[]).join(', ')||'—'))
    +kv('Sender name', esc((p.senderNames||[]).join(', ')||'—'))
    +kv('Excluded', esc((p.excludedIndustries||[]).join(', ')||'none'))
    +kv('Monthly cap', esc(p.monthlyLeadCap==null?'—':p.monthlyLeadCap+' / mo'))
    +kv('Timezone', esc(d.timezone||'(template default)'))
    +kv('Cities', esc((p.cities||[]).length)+' — '+esc((p.cities||[]).slice(0,8).join(', '))+((p.cities||[]).length>8?', …':''))
    +'</div></div>';

  h+='<div class="block"><h3>Apollo search URL <span class="pill">'+esc((p.cities||[]).length)+' cities · '+esc(d.stateName||'n/a')+'</span></h3>'
    +'<div class="urlbox"><input class="mono" id="apolloUrl" type="text" readonly value="'+esc(d.apolloUrl)+'" />'
    +'<button class="urlbtn" onclick="copyUrl()">Copy</button>'
    +'<a class="urlbtn" href="'+esc(d.apolloUrl)+'" target="_blank" rel="noopener">Open</a></div></div>';

  for(const c of (d.campaigns||[])){
    h+='<div class="block"><h3>'+esc(c.kind)+' — '+esc(c.name)+' <span class="pill '+(c.status==='draft'?'on':'')+'">'+esc(c.status)+'</span></h3><div class="kv">'
      +kv('Template', esc(c.templateName))
      +kv('Company', esc(c.companySwap.from)+' → '+esc(c.companySwap.to))
      +kv('Address', '→ '+esc(c.addressSwap.to)+(c.addressSwap.phone?'  (+ '+esc(c.addressSwap.phone)+')':''))
      +kv('Timezone', esc(c.timezone)+(c.templateTimezone&&c.templateTimezone!==c.timezone?'  (was '+esc(c.templateTimezone)+')':''))
      +(c.id?kv('Campaign','<a href="'+esc(c.url)+'" target="_blank" rel="noopener">'+esc(c.id)+'</a>'):'')
      +'</div>'
      +(c.signatureBefore?'<div class="sig"><div><div class="h">Before</div><pre>'+esc(c.signatureBefore)+'</pre></div><div><div class="h">After</div><pre>'+esc(c.signatureAfter)+'</pre></div></div>':'')
      +'</div>';
  }

  if(d.tag&&d.tag.label){
    h+='<div class="block"><h3>Account tag</h3><div class="kv">'
      +kv('Label', esc(d.tag.label))
      +kv('Tag id', esc(d.tag.id||'(created on Create)'))
      +kv('Scope', 'sending accounts — not campaigns')
      +kv('Applied to', esc((d.tag.taggedAccounts||[]).join(', ')||'none yet — inbox manager applies it'))
      +'</div></div>';
  }
  h+=logsHtml(d.logs);
  $('out').innerHTML=h;
}
$('btnPreview').onclick=()=>run(false);
$('btnCreate').onclick=()=>{ if(confirm('Create these campaigns (paused) in Instantly?')) run(true); };
</script>
</body>
</html>
